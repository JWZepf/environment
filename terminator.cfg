[global_config]
  inactive_color_offset = 0.805555555556
  suppress_multiple_term_dialog = True
  title_font = Hack Nerd Font Mono 9
  title_hide_sizetext = True
  title_inactive_bg_color = "#0accf7"
  title_inactive_fg_color = "#ffffff"
  title_receive_bg_color = "#f5c20f"
  title_receive_fg_color = "#000000"
  title_transmit_bg_color = "#ff0081"
  title_use_system_font = False
[keybindings]
  close_term = <Primary><Shift>q
  close_window = <Primary><Shift>t
  go_down = <Primary><Shift>j
  go_left = <Primary><Shift>h
  go_right = <Primary><Shift>l
  go_up = <Primary><Shift>k
  new_terminator = <Super>t
  split_horiz = <Primary><Shift>a
  split_vert = <Primary><Shift>w
[layouts]
  [[default]]
    [[[child1]]]
      parent = window0
      type = Terminal
    [[[window0]]]
      parent = ""
      type = Window
[plugins]
[profiles]
  [[default]]
    background_color = "#ffffff"
    cursor_color = "#ff0081"
    cursor_color_fg = False
    foreground_color = "#000000"
    palette = "#2e3436:#ff0081:#0accf7:#c4a000:#0accf7:#73d216:#ef2929:#d3d7cf:#555753:#ef2929:#ff0081:#fce94f:#0accf7:#f5c20f:#34e2e2:#eeeeec"
  [[New Profile]]
    background_color = "#ffffff"
    cursor_color = "#0accf7"
    cursor_color_fg = False
    foreground_color = "#000000"
    palette = "#2e3436:#ff0081:#0accf7:#c4a000:#0accf7:#39d088:#0accf7:#d3d7cf:#555753:#ef2929:#ff0081:#fce94f:#0accf7:#f5c20f:#34e2e2:#eeeeec"
